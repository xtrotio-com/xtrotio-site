<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Private Portal</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* DARK GOLD THEME */
        nav { background: #000; padding: 18px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #d4af37; display: flex; justify-content: center; gap: 30px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 2px; }

        .header { text-align: center; padding: 80px 20px; background: linear-gradient(180deg, #1a1500 0%, #050505 100%); }
        .header h1 { font-size: clamp(30px, 8vw, 50px); color: #d4af37; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); margin: 0; letter-spacing: 5px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1000px; margin: auto; }

        .card { 
            background: #0f0f0f; border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.4s; position: relative;
        }
        
        /* THE "LOCK" OVERLAY EFFECT */
        .locked-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #d4af37; z-index: 2; pointer-events: none;
        }

        .banner-container { width: 100%; padding-top: 140%; position: relative; background: #111; }
        .banner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(8px) brightness(0.5); }

        .info { padding: 25px; text-align: center; }
        .title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #d4af37; letter-spacing: 1px; }

        .btn { 
            display: block; width: 100%; background: #d4af37; color: #000; text-decoration: none; padding: 12px; border-radius: 8px; 
            font-weight: bold; font-size: 13px; text-transform: uppercase; transition: 0.3s; border: none; cursor: pointer;
        }
        .btn:hover { background: #fff; transform: scale(1.02); }

        footer { text-align: center; padding: 60px; color: #333; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="/">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/editors/">EDITORS</a>
    </nav>

    <div class="header">
        <h1>PRIVATE ACCESS</h1>
        <p style="color: #666; letter-spacing: 3px;">UNLOCK PREMIUM CONTENT VIA TELEGRAM</p>
    </div>

    <div class="grid">
        <div class="card">
            <div class="locked-overlay">🔒</div>
            <div class="banner-container"><img src="/movies/posters/m1.jpeg" class="banner"></div>
            <div class="info">
                <div class="title">PRIVATE COLLECTION 01</div>
                <button onclick="autoFill('Unlock Private Collection 01')" class="btn">UNLOCK IN BOT</button>
            </div>
        </div>

        <div class="card">
            <div class="locked-overlay">🔒</div>
            <div class="banner-container"><img src="/movies/posters/m2.jpeg" class="banner"></div>
            <div class="info">
                <div class="title">EXCLUSIVE ACCESS 02</div>
                <button onclick="autoFill('Unlock Exclusive Access 02')" class="btn">UNLOCK IN BOT</button>
            </div>
        </div>
    </div>

    <footer>XTROTIO PRIVATE NETWORK • 2026</footer>

    <script>
        function autoFill(contentName) {
            const botUser = "ProSearchM7Bot";
            const text = encodeURIComponent(contentName);
            window.open(`https://t.me/share/url?url=https://t.me/${botUser}&text=${text}`, '_blank');
        }
    </script>
</body>
</html>
