        nav {

        nav a {

        nav a:hover {

        /* 3. PRIVATE HEADER */
        .header {

            padding: 100px 20px; 
            background: radial-gradient(circle at center, #1a1500 0%, #050505 100%); 
        }
        .header h1 { 
            font-size: clamp(35px, 8vw, 55px); 
            color: #d4af37; 
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); 
            margin: 0; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
        }
        .header p { 
            color: #666; 
            letter-spacing: 3px; 
            font-size: 11px; 
            margin-top: 15px; 
            text-transform: uppercase;
        }

        /* 4. GRID & CARDS */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            padding: 40px 20px; 
            max-width: 1200px; 
            margin: auto; 
        }

        .card { 
            background: #0f0f0f; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.4s; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
        }
        .card:hover { 
            border-color: #d4af37; 
            transform: translateY(-5px); 
        }
        
        /* LOCK OVERLAY */
        .locked-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 40px; color: #d4af37; 
            z-index: 2; pointer-events: none; 
        }

        .banner-container { width: 100%; padding-top: 140%; position: relative; background: #111; }
        .banner { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; 
            filter: blur(12px) brightness(0.4); 
        }

        .info { 
            padding: 25px; 
            text-align: center; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }
        .title {

            font-weight: bold; 
            margin-bottom: 15px; 
            color: #d4af37; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }

        .btn { 
            display: block; width: 100%; 
            background: #d4af37; color: #000; 
            text-decoration: none; padding: 14px; 
            border-radius: 8px; 
            font-weight: 900; font-size: 12px; 
            text-transform: uppercase; 
            transition: 0.3s; border: none; 
            cursor: pointer; font-family: inherit;
        }
        .btn:hover { 
            background: #fff; 
            transform: scale(1.02); 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); 
        }

        footer { text-align: center; padding: 80px; color: #333; font-size: 11px; letter-spacing: 2px; }

        /* MOBILE OVERRIDE */
        @media (max-width: 480px) {
            nav { padding: 20px 8px; gap: 10px; }
            nav a { font-size: 9px; letter-spacing: 0.5px; }
        }
