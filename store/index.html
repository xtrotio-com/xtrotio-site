<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BYTS44KDWM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BYTS44KDWM');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XTROTIO | Official Store</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        /* 1. GLOBAL RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* 2. CONSISTENT NAVIGATION */
        nav {
            position: sticky; top: 0; width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 25px 10px; 
            z-index: 1000;
            border-bottom: 2px solid #e50914; 
            display: flex; justify-content: center; 
            gap: clamp(10px, 4vw, 40px);
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: clamp(10px, 2.5vw, 13px); 
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            white-space: nowrap;
        }

        nav a:hover { color: #e50914; text-shadow: 0 0 10px #e50914; }

        nav a.active-page::after {
            content: '';
            position: absolute; bottom: -8px; left: 0;
            width: 100%; height: 2px;
            background: #e50914;
            box-shadow: 0 0 10px #e50914;
        }

        .vip { color: #d4af37 !important; }

        /* 3. STORE HEADER */
        .store-header {
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        .store-header h1 {
            font-size: clamp(35px, 8vw, 55px);
            color: #fff;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .store-header span { color: #e50914; }

        /* 4. PRODUCT GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .product-card {
            background: #0a0a0a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: #e50914;
            transform: translateY(-5px);
        }

        .img-container {
            width: 100%;
            padding-top: 100%; /* Square Aspect Ratio */
            background: #111;
            position: relative;
        }

        .img-container img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-name {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
            text-transform: uppercase;
        }

        .price {
            color: #e50914;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .buy-btn {
            display: block;
            width: 100%;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .buy-btn:hover { background: #e50914; color: #fff; }

        footer { text-align: center; padding: 60px; color: #222; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="/">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE</a>
        <a href="/store/" class="active-page">STORE</a>
        <a href="/tools/">AI TOOLS</a>
        <a href="/18plus/" class="vip">VIP 18+</a>
    </nav>

    <div class="store-header">
        <h1>TECH <span>STORE</span></h1>
        <p style="color: #444; letter-spacing: 3px; font-size: 10px; margin-top: 15px; text-transform: uppercase;">Problem-Solving Gadgets</p>
    </div>

    <div class="grid">
        <div class="product-card">
            <div class="img-container">
                <img src="product1.jpg" alt="Silent Baby Hair Clipper">
            </div>
            <div class="product-info">
                <div class="product-name">Silent Baby Hair Clipper</div>
                <div class="price">₹1,299</div>
                <a href="https://xtrotio.myshopify.com" class="buy-btn">View on Store</a>
            </div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="product2.jpg" alt="Smart Home Hub">
            </div>
            <div class="product-info">
                <div class="product-name">Smart Home Hub</div>
                <div class="price">₹2,499</div>
                <a href="https://xtrotio.myshopify.com" class="buy-btn">View on Store</a>
            </div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="product3.jpg" alt="RFID Digital Lock">
            </div>
            <div class="product-info">
                <div class="product-name">RFID Digital Door Lock</div>
                <div class="price">₹3,999</div>
                <a href="https://xtrotio.myshopify.com" class="buy-btn">View on Store</a>
            </div>
        </div>
    </div>

    <footer>XTROTIO COMMERCE • 2026</footer>

</body>
</html>
