<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BYTS44KDWM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BYTS44KDWM');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XTROTIO | Live Connect</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        /* 1. GLOBAL RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 2. MATCHING NAVIGATION */
        nav {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 25px 10px; 
            z-index: 1000;
            border-bottom: 2px solid #e50914; 
            display: flex; justify-content: center; 
            gap: clamp(10px, 4vw, 40px);
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: clamp(10px, 2.5vw, 13px); 
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            white-space: nowrap;
        }

        nav a:hover { color: #e50914; text-shadow: 0 0 10px #e50914; }

        /* Active Indicator */
        nav a.active-page::after {
            content: '';
            position: absolute; bottom: -8px; left: 0;
            width: 100%; height: 2px;
            background: #e50914;
            box-shadow: 0 0 10px #e50914;
        }

        .vip { color: #d4af37 !important; }

        /* 3. LIVE INTERFACE */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at center, #110000 0%, #000 100%);
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            height: 65vh;
        }
        
        .video-box {
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .video-box video { width: 100%; height: 100%; object-fit: cover; }
        
        .status-label {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 5;
        }

        /* 4. CONTROLS */
        .controls {
            padding: 40px;
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .action-btn {
            padding: 18px 45px;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .btn-next { background: #e50914; color: #fff; box-shadow: 0 0 25px rgba(229, 9, 20, 0.4); }
        .btn-next:hover { transform: scale(1.05); background: #ff1e2b; }
        .btn-stop { background: #1a1a1a; color: #666; border: 1px solid #333; }
        .btn-stop:hover { color: #fff; background: #222; }

        /* MOBILE OVERRIDE */
        @media (max-width: 600px) {
            .video-grid { height: 75vh; grid-template-columns: 1fr; }
            .controls { padding: 20px; }
            .action-btn { padding: 15px 30px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/" class="active-page">LIVE</a>
        <a href="/editors/">EDITORS</a>
        <a href="/tools/">AI TOOLS</a>
        <a href="/18plus/" class="vip">VIP 18+</a>
    </nav>

    <div class="chat-container">
        <div class="video-grid">
            <div class="video-box">
                <div class="status-label">STRANGER</div>
                <video id="remoteVideo" autoplay playsinline></video>
                <div id="status-msg" style="color: #333; font-size: 13px;">Looking for partner...</div>
            </div>
            
            <div class="video-box">
                <div class="status-label" style="color: #e50914;">YOU (LIVE)</div>
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button class="action-btn btn-stop" onclick="location.reload()">STOP</button>
            <button class="action-btn btn-next" id="nextBtn">NEXT STRANGER</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // Camera setup logic
        const localVideo = document.getElementById('localVideo');
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => { localVideo.srcObject = stream; })
            .catch(err => { console.error("Camera access denied"); });

        // Your Firebase matching logic will be triggered by this button
        document.getElementById('nextBtn').onclick = () => {
            console.log("GA Tracking: User requested next partner");
            gtag('event', 'click', { 'event_category': 'LiveChat', 'event_label': 'NextPartner' });
            // Add PeerJS connection logic here
        };
    </script>
</body>
</html>
