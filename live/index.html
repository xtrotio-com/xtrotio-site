<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Live Video Chat</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* NAVIGATION */
        nav { background: #000; padding: 18px 0; border-bottom: 2px solid #e50914; display: flex; justify-content: center; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .vip-link { color: #d4af37 !important; }

        /* LIVE CHAT LAYOUT */
        .chat-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 1000px; height: 60vh; }
        
        .video-box { background: #111; border: 2px solid #222; border-radius: 15px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .video-box video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; z-index: 10; }

        /* CONTROLS */
        .controls { padding: 30px; display: flex; gap: 20px; }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 14px; }
        .btn-start { background: #e50914; color: #fff; box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        .btn-stop { background: #222; color: #fff; }
        .btn:hover { transform: scale(1.05); }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .video-grid { grid-template-columns: 1fr; height: 70vh; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE CHAT</a>
        <a href="/18plus/" class="vip-link">VIP 18+</a>
    </nav>

    <div class="chat-container">
        <div class="video-grid">
            <div class="video-box">
                <div class="label">STRANGER</div>
                <video id="remoteVideo" autoplay playsinline></video>
                <div id="status" style="position:absolute; color:#555;">Waiting for partner...</div>
            </div>
            
            <div class="video-box">
                <div class="label">YOU</div>
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-stop" onclick="location.reload()">STOP</button>
            <button class="btn btn-start" id="nextBtn">NEXT & FIND</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        // Use your existing Firebase logic here to match Peer IDs
        const localVideo = document.getElementById('localVideo');
        
        // Basic camera setup
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localVideo.srcObject = stream;
            })
            .catch(err => {
                alert("Please allow camera access to use XTROTIO Live");
            });

        document.getElementById('nextBtn').onclick = () => {
            // Your Firebase "Find Random Partner" logic goes here
            console.log("Searching for next stranger...");
        };
    </script>
</body>
</html>
