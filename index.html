<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Official Home</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* GLOBAL STYLES */
        body {
            margin: 0; padding: 0;
            background-color: #000; color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* PREMIUM GLASS MENU */
        nav {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 0;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            gap: clamp(15px, 4vw, 40px);
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
        }

        /* HOVER EFFECTS */
        nav a:hover { color: #fff; }
        
        /* THE RED INDICATOR FOR ACTIVE PAGE */
        nav a.active { color: #e50914; }
        nav a.active::after {
            content: '';
            position: absolute; bottom: -5px; left: 0;
            width: 100%; height: 2px;
            background: #e50914;
            box-shadow: 0 0 10px #e50914;
        }

        /* HERO SECTION */
        .hero {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
            padding: 40px;
        }

        .logo-main {
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            margin: 0;
            text-transform: lowercase;
        }

        .logo-main span { color: #e50914; }

        .tagline {
            color: #666;
            font-size: 14px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #222;
            font-size: 11px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/editors/">EDITORS</a>
        <a href="/tools/">AI TOOLS</a>
        <a href="/18plus/" style="color: #d4af37;">VIP 18+</a>
    </nav>

    <div class="hero">
        <h1 class="logo-main">xtrotio<span>.</span></h1>
        <p class="tagline">The Future of Content</p>
    </div>

    <footer>
        © 2026 XTROTIO GLOBAL NETWORK
    </footer>

</body>
</html>
