<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XTROTIO | Official Home</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* 1. FIXED GLOBAL STYLES */
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            min-width: 1200px; /* Prevents the page from shrinking/stacking */
        }

        /* 2. RIGID NAVIGATION (Matches Movies Page exactly) */
        nav {
            position: sticky; 
            top: 0; 
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            padding: 25px 0; 
            z-index: 1000;
            border-bottom: 2px solid #e50914; 
            display: flex; 
            justify-content: center; 
            gap: 40px; /* Fixed wide gap */
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px; 
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
        }

        nav a:hover { 
            color: #e50914; 
            text-shadow: 0 0 10px #e50914; 
        }

        /* Active Indicator */
        nav a.active-page::after {
            content: '';
            position: absolute; bottom: -8px; left: 0;
            width: 100%; height: 2px;
            background: #e50914;
            box-shadow: 0 0 10px #e50914;
        }

        .vip { color: #d4af37 !important; }

        /* 3. FIXED HERO SECTION */
        .hero-section {
            text-align: center;
            padding: 150px 0; 
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            height: 800px; /* Fixed height instead of viewport height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-main {
            font-size: 120px; /* Fixed massive size */
            font-weight: 900;
            color: #fff;
            text-transform: lowercase;
            letter-spacing: -5px;
            margin: 0;
        }

        .logo-main span { color: #e50914; }

        .tagline {
            color: #666; 
            letter-spacing: 12px; 
            font-size: 14px; 
            margin-top: 20px;
            text-transform: uppercase;
        }

        footer { 
            text-align: center; 
            padding: 80px; 
            color: #222; 
            font-size: 12px; 
            letter-spacing: 2px; 
            background: #000;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active-page">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE</a>
        <a href="/editors/">EDITORS</a>
        <a href="/18plus/" class="vip">VIP 18+</a>
    </nav>

    <div class="hero-section">
        <h1 class="logo-main">xtrotio<span>.</span></h1>
        <p class="tagline">The Content Network</p>
    </div>

    <footer>XTROTIO GLOBAL • 2026</footer>

</body>
</html>
