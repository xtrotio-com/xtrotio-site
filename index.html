<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BYTS44KDWM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BYTS44KDWM');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Official Home</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* 1. GLOBAL RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* 2. RIGID NAVIGATION (Matches Movies Page exactly) */
        nav {
            position: sticky; 
            top: 0; 
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            padding: 25px 10px; 
            z-index: 1000;
            border-bottom: 2px solid #e50914; 
            display: flex; 
            justify-content: center; 
            gap: clamp(10px, 4vw, 40px); /* Adjusts gap for different screen sizes */
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: clamp(10px, 2.5vw, 14px); 
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            white-space: nowrap;
        }

        nav a:hover { 
            color: #e50914; 
            text-shadow: 0 0 10px #e50914; 
        }

        /* Active Indicator */
        nav a.active-page::after {
            content: '';
            position: absolute; bottom: -8px; left: 0;
            width: 100%; height: 2px;
            background: #e50914;
            box-shadow: 0 0 10px #e50914;
        }

        .vip { color: #d4af37 !important; }
        .vip:hover { text-shadow: 0 0 10px #d4af37 !important; }

        /* 3. HERO SECTION (Massive Center Logo) */
        .hero-section {
            text-align: center;
            padding: 100px 20px;
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-main {
            font-size: clamp(80px, 18vw, 140px);
            font-weight: 900;
            color: #fff;
            text-transform: lowercase;
            letter-spacing: -5px;
            margin: 0;
            filter: drop-shadow(0 0 30px rgba(229, 9, 20, 0.3));
        }

        .logo-main span { color: #e50914; }

        .tagline {
            color: #555; 
            letter-spacing: 10px; 
            font-size: 12px; 
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: 400;
        }

        footer { 
            text-align: center; 
            padding: 50px; 
            color: #222; 
            font-size: 11px; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active-page">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE</a>
        <a href="/editors/">EDITORS</a>
        <a href="/18plus/" class="vip">VIP 18+</a>
    </nav>

    <div class="hero-section">
        <h1 class="logo-main">xtrotio<span>.</span></h1>
        <p class="tagline">The Content Network</p>
    </div>

    <footer>XTROTIO GLOBAL • 2026</footer>

</body>
</html>
