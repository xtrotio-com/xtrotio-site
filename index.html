<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XTROTIO | Official</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* 1. GLOBAL RESET */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%;
            margin: 0; padding: 0; 
            background-color: #000; color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }

        /* 2. MATCHING PREMIUM NAVIGATION */
        nav {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            /* Increased height and matching border */
            padding: 25px 0; 
            z-index: 1000;
            border-bottom: 2px solid #e50914; 
            display: flex; justify-content: center; 
            gap: clamp(15px, 5vw, 40px);
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px; /* Larger text to match movies page */
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
        }

        /* Red Glow Hover (Matching Movies/18+ theme) */
        nav a:hover { 
            color: #e50914; 
            text-shadow: 0 0 10px #e50914; 
        }

        /* Active Page Indicator */
        nav a.active::after {
            content: '';
            position: absolute; bottom: -8px; left: 0;
            width: 100%; height: 2px;
            background: #e50914;
            box-shadow: 0 0 10px #e50914;
        }

        /* VIP Gold Link */
        .vip { 
            color: #d4af37 !important; 
            transition: 0.3s;
        }
        .vip:hover { 
            text-shadow: 0 0 10px #d4af37 !important; 
        }

        /* 3. CENTER BRANDING AREA */
        .main-container {
            height: 100vh;
            width: 100vw;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 60%, #000 100%);
            text-align: center;
            padding: 20px;
        }

        .logo-main {
            font-size: clamp(80px, 20vw, 150px);
            font-weight: 900; 
            letter-spacing: -5px;
            margin: 0; 
            text-transform: lowercase;
            color: #fff;
            /* Added deep glow shadow to the logo */
            filter: drop-shadow(0 0 40px rgba(229, 9, 20, 0.4));
            animation: float 4s ease-in-out infinite;
        }
        .logo-main span { color: #e50914; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .tagline {
            color: #666; font-size: 12px;
            letter-spacing: 10px; text-transform: uppercase;
            margin-top: 30px;
            font-weight: 400;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 480px) {
            nav { padding: 20px 10px; gap: 15px; }
            nav a { font-size: 10px; letter-spacing: 1px; }
            .logo-main { letter-spacing: -3px; }
            .tagline { letter-spacing: 5px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE</a>
        <a href="/editors/">EDITORS</a>
        <a href="/18plus/" class="vip">VIP 18+</a>
    </nav>

    <div class="main-container">
        <h1 class="logo-main">xtrotio<span>.</span></h1>
        <p class="tagline">The Content Network</p>
    </div>

</body>
</html>
