<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XTROTIO | Official</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* 1. RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: #fff; 
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* 2. TOP MENU WITH WATER RIPPLE */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; 
            justify-content: center;
            z-index: 1000;
        }

        .nav-item {
            position: relative; 
            overflow: hidden; /* Important for water effect */
            padding: 20px 12px;
            color: #888;
            text-decoration: none;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .nav-item.active { color: #e50914; }
        .vip { color: #d4af37 !important; }

        /* WATER RIPPLE ANIMATION */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0);
            animation: water-drop 0.6s linear;
            pointer-events: none;
        }

        @keyframes water-drop {
            to { transform: scale(4); opacity: 0; }
        }

        /* 3. HERO SECTION (Logo in Center) */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a0000 0%, #000 85%);
            text-align: center;
            padding-top: 60px; /* Offset for top menu */
        }

        .logo-main {
            font-size: clamp(60px, 15vw, 100px);
            font-weight: 900;
            letter-spacing: -4px;
            margin: 0;
            text-transform: lowercase;
            animation: float 4s ease-in-out infinite;
        }
        .logo-main span { color: #e50914; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .tagline {
            color: #444;
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 480px) {
            .nav-item { padding: 20px 8px; font-size: 9px; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <a href="/" class="nav-item active">HOME</a>
        <a href="/movies/" class="nav-item">MOVIES</a>
        <a href="/live/" class="nav-item">LIVE</a>
        <a href="/editors/" class="nav-item">EDITORS</a>
        <a href="/18plus/" class="nav-item vip">VIP 18+</a>
    </nav>

    <div class="hero">
        <h1 class="logo-main">xtrotio<span>.</span></h1>
        <p class="tagline">Global Content Network</p>
    </div>

    <script>
        // WATER RIPPLE LOGIC
        document.querySelectorAll('.nav-item').forEach(link => {
            link.addEventListener('click', function(e) {
                // Prevent immediate navigation so user sees the ripple
                // (Optional: remove e.preventDefault() if you want instant redirect)
                
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);

                let rect = this.getBoundingClientRect();
                let size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                
                let x = e.clientX - rect.left - size / 2;
                let y = e.clientY - rect.top - size / 2;
                
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';

                // Cleanup
                ripple.addEventListener('animationend', () => {
                    ripple.remove();
                });
            });
        });
    </script>

</body>
</html>
