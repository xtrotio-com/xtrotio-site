<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Cinema Portal</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
        }

        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #e50914;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .category-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #2b0000 0%, #000 100%);
        }
        .category-header h1 {
            font-size: clamp(30px, 8vw, 50px);
            color: #e50914;
            text-shadow: 0 0 20px #e50914;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .movie-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.4s;
        }
        .movie-card:hover { 
            border-color: #e50914;
            transform: translateY(-5px);
        }

        .banner-container {
            width: 100%;
            height: 400px;
            background: #222;
            overflow: hidden;
        }

        .banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block; /* Ensures no weird gaps */
        }

        .movie-info {
            padding: 20px;
            text-align: center;
        }

        .movie-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tg-button {
            display: block;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
        }

        footer { text-align: center; padding: 40px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <nav>
        <a href="https://www.xtrotio.com">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/editors/">EDITORS</a>
        <a href="/tools/">AI TOOLS</a>
    </nav>

    <div class="category-header">
        <h1>CINEMA PORTAL</h1>
        <p style="color: #888; letter-spacing: 2px;">SEARCH & DOWNLOAD VIA TELEGRAM BOT</p>
    </div>

    <div class="grid">
        <div class="movie-card">
            <div class="banner-container">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=500&q=80" class="banner" alt="Movie 1">
            </div>
            <div class="movie-info">
                <div class="movie-title">LATEST RELEASES</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <div class="banner-container">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=500&q=80" class="banner" alt="Movie 2">
            </div>
            <div class="movie-info">
                <div class="movie-title">POPULAR DRAMA</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <div class="banner-container">
                <img src="https://images.unsplash.com/photo-1598899134739-24c46f58b8c0?auto=format&fit=crop&w=500&q=80" class="banner" alt="Movie 3">
            </div>
            <div class="movie-info">
                <div class="movie-title">ACTION HITS</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>
    </div>

    <footer>
        XTROTIO MOVIE NETWORK • POWERED BY PROSEARCH BOT
    </footer>

</body>
</html>
