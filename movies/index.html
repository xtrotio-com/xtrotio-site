<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Cinema Portal</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        /* GLOBAL STYLES */
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #e50914;
            display: flex;
            justify-content: center;
            gap: 30px;
            backdrop-filter: blur(15px);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        nav a:hover { color: #e50914; text-shadow: 0 0 10px #e50914; }

        /* HEADER */
        .category-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #2b0000 0%, #000 100%);
        }
        .category-header h1 {
            font-size: clamp(30px, 8vw, 50px);
            color: #e50914;
            text-shadow: 0 0 20px #e50914;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* MOVIE GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        /* MOVIE CARD STYLING */
        .movie-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.4s;
            position: relative;
        }
        .movie-card:hover { 
            transform: scale(1.03); 
            border-color: #e50914;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.3);
        }

        /* MOVIE BANNER */
        .banner {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-bottom: 3px solid #e50914;
        }

        .movie-info {
            padding: 20px;
            text-align: center;
        }

        .movie-title {
            font-size: 20px;
            font-weight: 900;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            color: #fff;
        }

        .movie-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* TELEGRAM BUTTON */
        .tg-button {
            display: block;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .tg-button:hover { 
            background: #ff1e2b;
            box-shadow: 0 0 15px #e50914;
        }

        footer { text-align: center; padding: 40px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <nav>
        <a href="https://www.xtrotio.com">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/editors/">EDITORS</a>
        <a href="/tools/">AI TOOLS</a>
    </nav>

    <div class="category-header">
        <h1>CINEMA PORTAL</h1>
        <p style="color: #888; letter-spacing: 2px;">SEARCH & DOWNLOAD VIA TELEGRAM BOT</p>
    </div>

    <div class="grid">
        <div class="movie-card">
            <img src="https://images.alphacoders.com/121/1210111.jpg" class="banner" alt="The Batman">
            <div class="movie-info">
                <div class="movie-title">The Batman</div>
                <div class="movie-meta">2022 • Action/Crime • 4K</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://images.alphacoders.com/550/550579.jpg" class="banner" alt="Interstellar">
            <div class="movie-info">
                <div class="movie-title">Interstellar</div>
                <div class="movie-meta">2014 • Sci-Fi/Drama • 4K</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <img src="https://images.alphacoders.com/128/1287714.jpg" class="banner" alt="Avatar: Way of Water">
            <div class="movie-info">
                <div class="movie-title">Avatar: Way of Water</div>
                <div class="movie-meta">2022 • Sci-Fi/Action • 4K</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>
    </div>

    <footer>
        XTROTIO MOVIE NETWORK • POWERED BY PROSEARCH BOT
    </footer>

</body>
</html>
